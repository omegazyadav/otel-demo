services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: notes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: omegazyadav/note-app:latest
    container_name: note-app
    ports:
      - "8080:8080"
    environment:
      # CRITICAL: Use the service name 'db' as the hostname
      DB_DSN: "host=db user=postgres password=yourpassword dbname=notes_db port=5432 sslmode=disable"
    depends_on:
      - db

volumes:
  postgres_data:
