replicaCount: 1

image:
  repository: omegazyadav/demo-app
  tag: latest
  pullPolicy: Always

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 30

readinessProbe:
  httpGet:
    path: /status
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 30

startupProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 2
  failureThreshold: 30

extraEnvs:
  - name: OTEL_SERVICE_NAME
    value: demo-app
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: otel-collector.monitoring.svc.cluster.local:4317

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: /metrics
  prometheus.io/port: "8080"

ingress:
  enabled: true
  className: ""
  annotations: {}
  host: demo.local
  path: /
  pathType: Prefix
  tls: []

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
