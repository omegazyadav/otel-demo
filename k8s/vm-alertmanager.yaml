apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
            # MOUNT THE SECRET HERE
            - name: slack-secret-volume
              mountPath: /etc/alertmanager/secrets
              readOnly: true
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
        # DEFINE THE SECRET VOLUME
        - name: slack-secret-volume
          secret:
            secretName: alertmanager-slack-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "slack-notifications"

    receivers:
      - name: "slack-notifications"
        slack_configs:
          - api_url_file: "/etc/alertmanager/secrets/slack-api-url"
            channel: "#alert"
            send_resolved: true
            title: |
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }} - {{ .CommonLabels.severity }}
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Details:*
                • *Method:* `{{ .Labels.method }}`
                • *Path:* `{{ .Labels.path }}`
                • *Instance:* `{{ .Labels.exported_instance }}`
              *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
              {{ end }}
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - name: http
      protocol: TCP
      port: 9093
      targetPort: 9093
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
data:
  alert-rules.yaml: |
    groups:
      - name: example-alerts
        rules:
          - alert: NoteAppRequestDuration
            expr: rate(note_app_request_duration_seconds_bucket{job="otel-collector"}[1m]) > 0.1
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Note App HTTP Request Duration"
              description: "The HTTP request duration for the Note App has exceeded 0.1 seconds for the last minute."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmalert
  template:
    metadata:
      labels:
        app: vmalert
    spec:
      containers:
        - name: vmalert
          image: victoriametrics/vmalert:v1.101.0
          args:
            # Point to your rules file
            - "-rule=/etc/prometheus/alert-rules.yaml"
            # Where to get the data (VictoriaMetrics service)
            - "-datasource.url=http://victoria-metrics:8428"
            # Where to send the alerts (Your existing Alertmanager)
            - "-notifier.url=http://alertmanager:9093"
            # Allow remote-write for alert state (Optional)
            - "-remoteWrite.url=http://victoria-metrics:8428"
          volumeMounts:
            - name: prometheus-rules
              mountPath: /etc/prometheus/alert-rules.yaml
              subPath: alert-rules.yaml
      volumes:
        - name: prometheus-rules
          configMap:
            name: prometheus-rules # Reuse your existing rules ConfigMap
