apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
            # MOUNT THE SECRET HERE
            - name: slack-secret-volume
              mountPath: /etc/alertmanager/secrets
              readOnly: true
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
        # DEFINE THE SECRET VOLUME
        - name: slack-secret-volume
          secret:
            secretName: alertmanager-slack-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "slack-notifications"

    receivers:
      - name: "slack-notifications"
        slack_configs:
          - api_url_file: "/etc/alertmanager/secrets/slack-api-url"
            channel: "#alert"
            send_resolved: true
            title: |
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }} - {{ .CommonLabels.severity }}
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Details:*
                • *Method:* `{{ .Labels.method }}`
                • *Path:* `{{ .Labels.path }}`
                • *Instance:* `{{ .Labels.exported_instance }}`
              *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
              {{ end }}
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - name: http
      protocol: TCP
      port: 9093
      targetPort: 9093
  type: ClusterIP
