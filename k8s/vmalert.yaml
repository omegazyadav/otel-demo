apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
data:
  alert-rules.yaml: |
    groups:
      - name: example-alerts
        rules:
          - alert: NoteAppRequestDuration
            expr: rate(note_app_request_duration_seconds_bucket{job="otel-collector"}[1m]) > 0.1
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Note App HTTP Request Duration"
              description: "The HTTP request duration for the Note App has exceeded 0.1 seconds for the last minute."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmalert
  template:
    metadata:
      labels:
        app: vmalert
    spec:
      containers:
        - name: vmalert
          image: victoriametrics/vmalert:v1.101.0
          args:
            - "-rule=/etc/prometheus/alert-rules.yaml"
            - "-datasource.url=http://victoria-metrics:8428"
            - "-notifier.url=http://alertmanager:9093"
            - "-remoteWrite.url=http://victoria-metrics:8428"
          volumeMounts:
            - name: prometheus-rules
              mountPath: /etc/prometheus/alert-rules.yaml
              subPath: alert-rules.yaml
      volumes:
        - name: prometheus-rules
          configMap:
            name: prometheus-rules
