apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoria-metrics
  template:
    metadata:
      labels:
        app: victoria-metrics
    spec:
      containers:
        - name: victoria-metrics
          image: victoriametrics/victoria-metrics:v1.101.0
          args:
            # Tells VM to use your existing Prometheus scrape config
            - "-promscrape.config=/etc/prometheus/prometheus.yml"
            - "-storageDataPath=/storage"
            - "-retentionPeriod=1" # Retention in months
          ports:
            - containerPort: 8428
              name: http
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: victoria-storage
              mountPath: /storage
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config # Reuse your existing ConfigMap
        - name: victoria-storage
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'otel-collector'
        scrape_interval: 5s
        static_configs:
          - targets: ['otel-collector:8081']
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-metrics
spec:
  selector:
    app: victoria-metrics
  ports:
    - name: http
      port: 8428
      targetPort: 8428

